<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Planet data table</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>Planet data table</h1>
    <table>
      <caption>Data about the planets of our solar system (Plabetary facts taken from <a href="http://nssdc.gsfc.nasa.gov/planetary/factsheet/">Nasa's Planetary Fact sheet- Metric</a>)</caption>
      <thead>
        <tr>
          <th></th>
          <th>Name</th>
          <th>Mass (10<sup>24</sup>kg)</th>
          <th>Diameter (km)</th>
          <th>Density (Kg/m<sup>3</sup>)</th>
          <th>Gravity (m/s<sup>2</sup>)</th>
          <th>Length of day (hours)</th>
          <th>Distance from the sun (10<sup>6</sup>)</th>
          <th> Mean Temperature (°c)</th>
          <th>Number of Moons</th>
          <th>Notes</th>
        </tr>
      </thead>
    </table>
  </body>
</html>
